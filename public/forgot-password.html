<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuperar senha | Cia de Danca</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1c2430;
        --muted: #687386;
        --line: #dce1e8;
        --brand: #0f766e;
        --brand-dark: #115e59;
        --danger: #b42318;
        --success: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(100%, 420px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(28, 36, 48, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 46px;
        margin-bottom: 16px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        border-color: var(--brand);
        outline: 3px solid rgba(15, 118, 110, 0.18);
      }

      button {
        width: 100%;
        height: 46px;
        border: 0;
        border-radius: 6px;
        background: var(--brand);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:hover {
        background: var(--brand-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .message {
        display: none;
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.45;
      }

      .message.is-visible {
        display: block;
      }

      .message.success {
        background: #ecfdf3;
        color: var(--success);
      }

      .message.error {
        background: #fef3f2;
        color: var(--danger);
      }

      .dev-link {
        display: none;
        margin-top: 12px;
        overflow-wrap: anywhere;
        color: var(--brand-dark);
        font-size: 14px;
      }

      .dev-link.is-visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Recuperar senha</h1>
      <p id="description">Informe o e-mail cadastrado para receber as instrucoes de redefinicao.</p>

      <form id="form">
        <div id="emailField">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div id="passwordField" hidden>
          <label for="password">Nova senha</label>
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="3" maxlength="30" />
        </div>

        <button id="submitButton" type="submit">Enviar instrucoes</button>
      </form>

      <div id="message" class="message" role="status"></div>
      <a id="devLink" class="dev-link" href="#">Abrir link de redefinicao</a>
    </main>

    <script>
      const form = document.querySelector("#form");
      const title = document.querySelector("#title");
      const description = document.querySelector("#description");
      const emailField = document.querySelector("#emailField");
      const passwordField = document.querySelector("#passwordField");
      const emailInput = document.querySelector("#email");
      const passwordInput = document.querySelector("#password");
      const button = document.querySelector("#submitButton");
      const message = document.querySelector("#message");
      const devLink = document.querySelector("#devLink");
      const token = new URLSearchParams(window.location.search).get("token");

      if (token) {
        title.textContent = "Criar nova senha";
        description.textContent = "Defina uma nova senha para voltar a acessar sua conta.";
        emailField.hidden = true;
        emailInput.required = false;
        passwordField.hidden = false;
        passwordInput.required = true;
        button.textContent = "Salvar nova senha";
      }

      const showMessage = (text, type) => {
        message.textContent = text;
        message.className = `message ${type} is-visible`;
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        devLink.classList.remove("is-visible");

        const endpoint = token ? "/users/reset-password" : "/users/forgot-password";
        const payload = token
          ? { token, password: passwordInput.value }
          : { email: emailInput.value };

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();

          showMessage(data.message || "Operacao concluida", data.success ? "success" : "error");

          if (data.resetLink) {
            devLink.href = data.resetLink;
            devLink.classList.add("is-visible");
          }

          if (data.success && token) {
            form.reset();
          }
        } catch (_error) {
          showMessage("Nao foi possivel concluir a solicitacao agora", "error");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
